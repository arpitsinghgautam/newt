<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrTeal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2dd4bf"/></marker>
    <marker id="arrIndigo" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#818cf8"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="879" height="319" rx="14" fill="#0d1117" stroke="#30363d"/>

  <!-- left card: this repo -->
  <rect x="40" y="40" width="360" height="236" rx="12" fill="#11161d" stroke="#1f6f64"/>
  <text x="220" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#2dd4bf">this repo (~4k lines)</text>
  <rect x="70" y="84" width="300" height="46" rx="8" fill="#1d1428" stroke="#c084fc"/>
  <text x="220" y="103" text-anchor="middle" font-size="13.5" font-weight="600" fill="#e6edf3">deuteron</text>
  <text x="220" y="120" text-anchor="middle" font-size="11" fill="#8b949e">tile DSL + autotuner (~700 lines)</text>
  <path d="M220 130 v10" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrTeal)"/>
  <rect x="70" y="146" width="300" height="46" rx="8" fill="#0c2b28" stroke="#2dd4bf"/>
  <text x="220" y="165" text-anchor="middle" font-size="13.5" font-weight="600" fill="#e6edf3">newt</text>
  <text x="220" y="182" text-anchor="middle" font-size="11" fill="#8b949e">block DSL + JIT compiler (~3,300 lines)</text>
  <path d="M220 192 v10" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrTeal)"/>
  <rect x="70" y="208" width="300" height="46" rx="8" fill="#161b22" stroke="#3d444d"/>
  <text x="220" y="227" text-anchor="middle" font-size="12.5" font-family="ui-monospace,'Cascadia Code',Consolas,monospace" fill="#e6edf3">CUDA C++ -> NVRTC -> cubin</text>
  <text x="220" y="244" text-anchor="middle" font-size="11" fill="#8b949e">in-process, via ctypes; no nvcc, no MLIR, no LLVM</text>

  <!-- right card: production -->
  <rect x="480" y="40" width="360" height="236" rx="12" fill="#11161d" stroke="#3c4173"/>
  <text x="660" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#818cf8">the production stack it mirrors</text>
  <rect x="510" y="84" width="300" height="46" rx="8" fill="#191d38" stroke="#818cf8"/>
  <text x="660" y="103" text-anchor="middle" font-size="13.5" font-weight="600" fill="#e6edf3">Helion</text>
  <text x="660" y="120" text-anchor="middle" font-size="11" fill="#8b949e">PyTorch: tile DSL + autotuner</text>
  <path d="M660 130 v10" stroke="#818cf8" stroke-width="2" marker-end="url(#arrIndigo)"/>
  <rect x="510" y="146" width="300" height="46" rx="8" fill="#191d38" stroke="#818cf8"/>
  <text x="660" y="165" text-anchor="middle" font-size="13.5" font-weight="600" fill="#e6edf3">Triton</text>
  <text x="660" y="182" text-anchor="middle" font-size="11" fill="#8b949e">OpenAI: block DSL + compiler</text>
  <path d="M660 192 v10" stroke="#818cf8" stroke-width="2" marker-end="url(#arrIndigo)"/>
  <rect x="510" y="208" width="300" height="46" rx="8" fill="#161b22" stroke="#3d444d"/>
  <text x="660" y="227" text-anchor="middle" font-size="12.5" font-family="ui-monospace,'Cascadia Code',Consolas,monospace" fill="#e6edf3">MLIR -> LLVM -> PTX -> SASS</text>
  <text x="660" y="244" text-anchor="middle" font-size="11" fill="#8b949e">hundreds of thousands of lines</text>

  <!-- connector -->
  <path d="M404 158 h72" stroke="#6e7681" stroke-width="1.8" stroke-dasharray="6 5"/>
  <text x="440" y="146" text-anchor="middle" font-size="11" fill="#8b949e">same ideas</text>
  <text x="440" y="176" text-anchor="middle" font-size="11" fill="#8b949e">~100x smaller</text>

  <text x="440" y="302" text-anchor="middle" font-size="12" fill="#6e7681">deuteron generates and autotunes newt kernels exactly as Helion generates and autotunes Triton kernels</text>
</svg>
