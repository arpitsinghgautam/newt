<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 270" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrM2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6e7681"/></marker>
    <marker id="arrOr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#f0883e"/></marker>
  </defs>
  <rect x="0.5" y="0.5" width="879" height="269" rx="14" fill="#0d1117" stroke="#30363d"/>
  <text x="440" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#e6edf3">what happens on a deuteron kernel's first call</text>

  <rect x="36" y="56" width="150" height="58" rx="8" fill="#1d1428" stroke="#c084fc"/>
  <text x="111" y="80" text-anchor="middle" font-size="12.5" font-weight="600" fill="#e6edf3">trace the AST</text>
  <text x="111" y="98" text-anchor="middle" font-size="10.5" fill="#8b949e">tiles -> grid + masks</text>
  <path d="M190 85 h12" stroke="#6e7681" stroke-width="2" marker-end="url(#arrM2)"/>
  <rect x="210" y="56" width="170" height="58" rx="8" fill="#1d1428" stroke="#c084fc"/>
  <text x="295" y="80" text-anchor="middle" font-size="12.5" font-weight="600" fill="#e6edf3">generate newt source</text>
  <text x="295" y="98" text-anchor="middle" font-size="10.5" fill="#8b949e">tile sizes = constexpr</text>
  <path d="M384 85 h12" stroke="#6e7681" stroke-width="2" marker-end="url(#arrM2)"/>
  <rect x="404" y="56" width="150" height="58" rx="8" fill="#2d1a0b" stroke="#f0883e"/>
  <text x="479" y="80" text-anchor="middle" font-size="12.5" font-weight="600" fill="#f0883e">eager oracle</text>
  <text x="479" y="98" text-anchor="middle" font-size="10.5" fill="#8b949e">same fn, plain PyTorch</text>
  <path d="M558 85 h12" stroke="#6e7681" stroke-width="2" marker-end="url(#arrM2)"/>
  <rect x="578" y="56" width="150" height="58" rx="8" fill="#1d1428" stroke="#c084fc"/>
  <text x="653" y="80" text-anchor="middle" font-size="12.5" font-weight="600" fill="#e6edf3">autotune</text>
  <text x="653" y="98" text-anchor="middle" font-size="10.5" fill="#8b949e">blocks x warps x stages</text>
  <path d="M732 85 h12" stroke="#6e7681" stroke-width="2" marker-end="url(#arrM2)"/>
  <rect x="752" y="56" width="100" height="58" rx="8" fill="#3b2260" stroke="#c084fc"/>
  <text x="802" y="80" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">launch best</text>
  <text x="802" y="98" text-anchor="middle" font-size="10.5" fill="#d8b4fe">cache to disk</text>

  <path d="M653 114 V146 H479 V122" stroke="#f0883e" stroke-width="1.8" fill="none" stroke-dasharray="6 5" marker-end="url(#arrOr)"/>
  <text x="566" y="168" text-anchor="middle" font-size="11" fill="#f0883e">every candidate runs on cloned inputs; a config whose output</text>
  <text x="566" y="184" text-anchor="middle" font-size="11" fill="#f0883e">mismatches the oracle is rejected before it is ever timed</text>

  <g font-size="12" text-anchor="middle" fill="#8b949e">
    <text x="440" y="222">masks propagate through traced tiles, so reductions on padded lanes get the right identity fill (max -> -inf, sum -> 0)</text>
    <text x="440" y="244">the winner persists to disk keyed by kernel + shape bucket + dtypes: the next call with similar shapes launches instantly</text>
  </g>
</svg>
