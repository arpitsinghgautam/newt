<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 250" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="0.5" y="0.5" width="879" height="249" rx="14" fill="#0d1117" stroke="#30363d"/>
  <text x="440" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#e6edf3">the group-cyclic layout: element i lives in thread <tspan font-family="ui-monospace,'Cascadia Code',Consolas,monospace" fill="#2dd4bf">(i / VEC) mod T</tspan></text>
  <text x="440" y="52" text-anchor="middle" font-size="11.5" fill="#8b949e">shown: 16 elements, 4 threads, VEC = 2 (real kernels use 16-byte groups: VEC = 4 floats or 8 halves)</text>

  <text x="66" y="95" text-anchor="end" font-size="12" fill="#6e7681">memory</text>
  <g font-family="ui-monospace,'Cascadia Code',Consolas,monospace" font-size="11" text-anchor="middle">
    <rect x="76" y="76" width="44" height="30" fill="#0c2b28" stroke="#2dd4bf"/><text x="98" y="95" fill="#2dd4bf">e0</text>
    <rect x="120" y="76" width="44" height="30" fill="#0c2b28" stroke="#2dd4bf"/><text x="142" y="95" fill="#2dd4bf">e1</text>
    <rect x="164" y="76" width="44" height="30" fill="#2d1a0b" stroke="#f0883e"/><text x="186" y="95" fill="#f0883e">e2</text>
    <rect x="208" y="76" width="44" height="30" fill="#2d1a0b" stroke="#f0883e"/><text x="230" y="95" fill="#f0883e">e3</text>
    <rect x="252" y="76" width="44" height="30" fill="#191d38" stroke="#818cf8"/><text x="274" y="95" fill="#818cf8">e4</text>
    <rect x="296" y="76" width="44" height="30" fill="#191d38" stroke="#818cf8"/><text x="318" y="95" fill="#818cf8">e5</text>
    <rect x="340" y="76" width="44" height="30" fill="#2b1220" stroke="#f778ba"/><text x="362" y="95" fill="#f778ba">e6</text>
    <rect x="384" y="76" width="44" height="30" fill="#2b1220" stroke="#f778ba"/><text x="406" y="95" fill="#f778ba">e7</text>
    <rect x="428" y="76" width="44" height="30" fill="#0c2b28" stroke="#2dd4bf"/><text x="450" y="95" fill="#2dd4bf">e8</text>
    <rect x="472" y="76" width="44" height="30" fill="#0c2b28" stroke="#2dd4bf"/><text x="494" y="95" fill="#2dd4bf">e9</text>
    <rect x="516" y="76" width="44" height="30" fill="#2d1a0b" stroke="#f0883e"/><text x="538" y="95" fill="#f0883e">e10</text>
    <rect x="560" y="76" width="44" height="30" fill="#2d1a0b" stroke="#f0883e"/><text x="582" y="95" fill="#f0883e">e11</text>
    <rect x="604" y="76" width="44" height="30" fill="#191d38" stroke="#818cf8"/><text x="626" y="95" fill="#818cf8">e12</text>
    <rect x="648" y="76" width="44" height="30" fill="#191d38" stroke="#818cf8"/><text x="670" y="95" fill="#818cf8">e13</text>
    <rect x="692" y="76" width="44" height="30" fill="#2b1220" stroke="#f778ba"/><text x="714" y="95" fill="#f778ba">e14</text>
    <rect x="736" y="76" width="44" height="30" fill="#2b1220" stroke="#f778ba"/><text x="758" y="95" fill="#f778ba">e15</text>
  </g>
  <g stroke-width="2.5">
    <path d="M80 114 H160" stroke="#2dd4bf"/><path d="M168 114 H248" stroke="#f0883e"/>
    <path d="M256 114 H336" stroke="#818cf8"/><path d="M344 114 H424" stroke="#f778ba"/>
    <path d="M432 114 H512" stroke="#2dd4bf"/><path d="M520 114 H600" stroke="#f0883e"/>
    <path d="M608 114 H688" stroke="#818cf8"/><path d="M696 114 H776" stroke="#f778ba"/>
  </g>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <text x="120" y="134" fill="#2dd4bf">thread 0</text><text x="208" y="134" fill="#f0883e">thread 1</text>
    <text x="296" y="134" fill="#818cf8">thread 2</text><text x="384" y="134" fill="#f778ba">thread 3</text>
    <text x="472" y="134" fill="#2dd4bf">thread 0</text><text x="560" y="134" fill="#f0883e">thread 1</text>
    <text x="648" y="134" fill="#818cf8">thread 2</text><text x="736" y="134" fill="#f778ba">thread 3</text>
  </g>
  <g font-size="12" text-anchor="middle" fill="#8b949e">
    <text x="440" y="172">adjacent threads always hold adjacent memory, so every warp access coalesces into one wide transaction</text>
    <text x="440" y="194">each thread owns 16 contiguous bytes: one 128-bit vector load per group, picked by a cheap runtime check</text>
    <text x="440" y="216">elementwise math never cares where elements live: each thread just loops over its own slots</text>
  </g>
</svg>
