  <rect x="170" y="120" width="552.2" height="18" rx="3" fill="#818cf8"/><text x="730" y="133" font-size="11" font-family="ui-monospace,Consolas,monospace" fill="#8b949e">767</text>

  <text x="158" y="162" text-anchor="end" font-size="12.5" fill="#e6edf3">layernorm fwd</text>
  <text x="158" y="177" text-anchor="end" font-size="11" fill="#6e7681">4096x8192</text>
  <rect x="170" y="148" width="450" height="18" rx="3" fill="#f0883e"/><text x="628" y="161" font-size="11" font-family="ui-monospace,Consolas,monospace" fill="#8b949e">625</text>
